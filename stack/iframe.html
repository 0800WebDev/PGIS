<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Javascript Stack Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<style>
@import url("https://fonts.googleapis.com/css?family=Comfortaa");

html, body {
  margin: 0;
  overflow: hidden;
  height: 100vh;
  width: 100%;
  position: relative;
  font-family: "Comfortaa", cursive;
}

#container { width: 100%; height: 100%; }

#container #score {
  position: absolute;
  top: 20px;
  width: 100%;
  text-align: center;
  font-size: 10vh;
  transition: transform 0.5s ease;
  color: #333344;
  transform: translatey(-200px) scale(1);
}

#container #game {
  position: absolute;
  inset: 0;
}

#container .game-over {
  position: absolute;
  inset: 0;
  height: 85%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

#container .game-over * {
  transition: opacity 0.5s ease, transform 0.5s ease;
  opacity: 0;
  transform: translatey(-50px);
  color: #333344;
}

#container .game-over h2 {
  margin: 0;
  font-size: 40px;
}

#container .game-ready {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-around;
}

#container .game-ready #start-button {
  transition: opacity 0.5s ease, transform 0.5s ease;
  opacity: 0;
  transform: translatey(-50px);
  border: 3px solid #333344;
  padding: 10px 20px;
  background-color: transparent;
  color: #333344;
  font-size: 30px;
}

#container #instructions {
  position: absolute;
  width: 100%;
  top: 16vh;
  text-align: center;
  transition: opacity 0.5s ease, transform 0.5s ease;
  opacity: 0;
}

#container #instructions.hide { opacity: 0 !important; }

#container.playing #score,
#container.resetting #score {
  transform: translatey(0px) scale(1);
}

#container.playing #instructions { opacity: 1; }

#container.ready .game-ready #start-button {
  opacity: 1;
  transform: translatey(0);
}

#container.ended #score {
  transform: translatey(6vh) scale(1.5);
}

#container.ended .game-over * {
  opacity: 1;
  transform: translatey(0);
}

#container.ended .game-over p {
  transition-delay: 0.3s;
}
</style>
</head>

<body>
<div id="container">
  <div id="game"></div>
  <div id="score">0</div>
  <div id="instructions">Click (or press the spacebar) to place the block</div>

  <div class="game-over">
    <h2>Game Over</h2>
    <p>You did great, you're the best.</p>
    <p>Click or spacebar to start again</p>
  </div>

  <div class="game-ready">
    <div id="start-button">Start</div>
    <div></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r83/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/latest/TweenMax.min.js"></script>

<script>
"use strict";
console.clear();

class Stage {
constructor() {
this.render = () => this.renderer.render(this.scene, this.camera);
this.add = elem => this.scene.add(elem);
this.remove = elem => this.scene.remove(elem);

this.container = document.getElementById('game');

this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
this.renderer.setSize(window.innerWidth, window.innerHeight);
this.renderer.setClearColor('#D0CBC7', 1);
this.container.appendChild(this.renderer.domElement);

this.scene = new THREE.Scene();

let aspect = window.innerWidth / window.innerHeight;
let d = 20;
this.camera = new THREE.OrthographicCamera(-d*aspect,d*aspect,d,-d,-100,1000);
this.camera.position.set(2,2,2);
this.camera.lookAt(new THREE.Vector3(0,0,0));

this.light = new THREE.DirectionalLight(0xffffff,0.5);
this.light.position.set(0,499,0);
this.scene.add(this.light);

this.softLight = new THREE.AmbientLight(0xffffff,0.4);
this.scene.add(this.softLight);

window.addEventListener('resize',()=>this.onResize());
this.onResize();
}

setCamera(y,speed=0.3){
TweenLite.to(this.camera.position,speed,{y:y+4,ease:Power1.easeInOut});
TweenLite.to(this.camera.lookAt,speed,{y:y,ease:Power1.easeInOut});
}

onResize(){
let viewSize=30;
this.renderer.setSize(window.innerWidth,window.innerHeight);
this.camera.left=window.innerWidth/-viewSize;
this.camera.right=window.innerWidth/viewSize;
this.camera.top=window.innerHeight/viewSize;
this.camera.bottom=window.innerHeight/-viewSize;
this.camera.updateProjectionMatrix();
}
}

class Block {
constructor(block){
this.STATES={ACTIVE:'active',STOPPED:'stopped',MISSED:'missed'};
this.MOVE_AMOUNT=12;

this.dimension={width:0,height:0,depth:0};
this.position={x:0,y:0,z:0};

this.targetBlock=block;
this.index=(block?block.index:0)+1;

this.workingPlane=this.index%2?'x':'z';
this.workingDimension=this.index%2?'width':'depth';

this.dimension.width=block?block.dimension.width:10;
this.dimension.height=block?block.dimension.height:2;
this.dimension.depth=block?block.dimension.depth:10;

this.position.x=block?block.position.x:0;
this.position.y=this.dimension.height*this.index;
this.position.z=block?block.position.z:0;

this.color=block?block.color:0x333344;

this.state=this.index>1?this.STATES.ACTIVE:this.STATES.STOPPED;

this.speed=-0.1-(this.index*0.005);
if(this.speed<-4) this.speed=-4;
this.direction=this.speed;

let geometry=new THREE.BoxGeometry(this.dimension.width,this.dimension.height,this.dimension.depth);
geometry.applyMatrix(new THREE.Matrix4().makeTranslation(this.dimension.width/2,this.dimension.height/2,this.dimension.depth/2));

this.material=new THREE.MeshToonMaterial({color:this.color,shading:THREE.FlatShading});
this.mesh=new THREE.Mesh(geometry,this.material);

this.mesh.position.set(this.position.x,this.position.y,this.position.z);

if(this.state==this.STATES.ACTIVE){
this.position[this.workingPlane]=Math.random()>0.5?-this.MOVE_AMOUNT:this.MOVE_AMOUNT;
}
}

reverseDirection(){
this.direction=this.direction>0?this.speed:Math.abs(this.speed);
}

place(){
this.state=this.STATES.STOPPED;

let overlap=this.targetBlock.dimension[this.workingDimension]-Math.abs(this.position[this.workingPlane]-this.targetBlock.position[this.workingPlane]);

let blocksToReturn={plane:this.workingPlane,direction:this.direction};

if(overlap>0){
let geometry=new THREE.BoxGeometry(this.dimension.width,this.dimension.height,this.dimension.depth);
geometry.applyMatrix(new THREE.Matrix4().makeTranslation(this.dimension.width/2,this.dimension.height/2,this.dimension.depth/2));
let mesh=new THREE.Mesh(geometry,this.material);
mesh.position.set(this.position.x,this.position.y,this.position.z);
blocksToReturn.placed=mesh;
}else{
this.state=this.STATES.MISSED;
}

return blocksToReturn;
}

tick(){
if(this.state==this.STATES.ACTIVE){
let value=this.position[this.workingPlane];
if(value>this.MOVE_AMOUNT||value<-this.MOVE_AMOUNT) this.reverseDirection();
this.position[this.workingPlane]+=this.direction;
this.mesh.position[this.workingPlane]=this.position[this.workingPlane];
}
}
}

class Game {
constructor(){
this.STATES={LOADING:'loading',PLAYING:'playing',READY:'ready',ENDED:'ended'};

this.blocks=[];
this.stage=new Stage();

this.mainContainer=document.getElementById('container');
this.scoreContainer=document.getElementById('score');
this.instructions=document.getElementById('instructions');

this.newBlocks=new THREE.Group();
this.placedBlocks=new THREE.Group();

this.stage.add(this.newBlocks);
this.stage.add(this.placedBlocks);

this.addBlock();
this.tick();
this.updateState(this.STATES.READY);

document.addEventListener('keydown',e=>{if(e.keyCode==32)this.onAction();});
document.addEventListener('click',()=>this.onAction());
}

updateState(s){
Object.values(this.STATES).forEach(x=>this.mainContainer.classList.remove(x));
this.mainContainer.classList.add(s);
this.state=s;
}

onAction(){
if(this.state==='ready') this.startGame();
else if(this.state==='playing') this.placeBlock();
else if(this.state==='ended') location.reload();
}

startGame(){
this.scoreContainer.innerHTML='0';
this.updateState('playing');
this.addBlock();
}

placeBlock(){
let current=this.blocks[this.blocks.length-1];
let result=current.place();

this.newBlocks.remove(current.mesh);
if(result.placed) this.placedBlocks.add(result.placed);

this.addBlock();
}

addBlock(){
let last=this.blocks[this.blocks.length-1];
if(last&&last.state==='missed') return this.endGame();

this.scoreContainer.innerHTML=this.blocks.length-1;

let block=new Block(last);
this.newBlocks.add(block.mesh);
this.blocks.push(block);

this.stage.setCamera(this.blocks.length*2);
if(this.blocks.length>=5) this.instructions.classList.add('hide');
}

endGame(){
this.updateState('ended');
}

tick(){
this.blocks[this.blocks.length-1].tick();
this.stage.render();
requestAnimationFrame(()=>this.tick());
}
}

new Game();
</script>
</body>
</html>
