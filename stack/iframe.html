<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Javascript Stack Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
@import url("https://fonts.googleapis.com/css?family=Comfortaa");

html, body {
  margin: 0;
  overflow: hidden;
  height: 100%;
  font-family: "Comfortaa", cursive;
}

#container { width:100%; height:100%; }

#score {
  position:absolute;
  top:20px;
  width:100%;
  text-align:center;
  font-size:10vh;
  color:#333344;
  transform:translateY(-200px);
  transition:.5s;
}

#game { position:absolute; inset:0; }

.game-over, .game-ready {
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

.game-over * {
  opacity:0;
  transform:translateY(-50px);
  transition:.5s;
}

#start-button {
  border:3px solid #333344;
  padding:10px 20px;
  font-size:30px;
  opacity:0;
  transform:translateY(-50px);
  transition:.5s;
}

#instructions {
  position:absolute;
  top:16vh;
  width:100%;
  text-align:center;
  opacity:0;
  transition:.5s;
}

.playing #score { transform:translateY(0); }
.playing #instructions { opacity:1; }
.ready #start-button { opacity:1; transform:none; }
.ended #score { transform:translateY(6vh) scale(1.5); }
.ended .game-over * { opacity:1; transform:none; }
</style>
</head>

<body>
<div id="container">
  <div id="game"></div>
  <div id="score">0</div>
  <div id="instructions">Click or press space</div>

  <div class="game-over">
    <h2>Game Over</h2>
    <p>Click or press space to restart</p>
  </div>

  <div class="game-ready">
    <div id="start-button">Start</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r83/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/latest/TweenMax.min.js"></script>

<script>
"use strict";

class Stage {
constructor(){
this.container=document.getElementById("game");

this.renderer=new THREE.WebGLRenderer({antialias:true});
this.renderer.setSize(innerWidth,innerHeight);
this.renderer.setClearColor("#D0CBC7");
this.container.appendChild(this.renderer.domElement);

this.scene=new THREE.Scene();

let aspect=innerWidth/innerHeight;
let d=20;
this.camera=new THREE.OrthographicCamera(-d*aspect,d*aspect,d,-d,-100,1000);
this.camera.position.set(2,2,2);
this.camera.lookAt(0,0,0);

this.scene.add(new THREE.AmbientLight(0xffffff,0.4));

let light=new THREE.DirectionalLight(0xffffff,0.5);
light.position.set(0,500,0);
this.scene.add(light);

addEventListener("resize",()=>this.resize());
this.resize();
}

resize(){
let view=30;
this.renderer.setSize(innerWidth,innerHeight);
this.camera.left=innerWidth/-view;
this.camera.right=innerWidth/view;
this.camera.top=innerHeight/view;
this.camera.bottom=innerHeight/-view;
this.camera.updateProjectionMatrix();
}

render(){ this.renderer.render(this.scene,this.camera); }
add(e){ this.scene.add(e); }
remove(e){ this.scene.remove(e); }
}

class Block {
constructor(prev){
this.prev=prev;
this.index=(prev?prev.index:0)+1;

this.width=prev?prev.width:10;
this.depth=prev?prev.depth:10;
this.height=2;

this.x=prev?prev.x:0;
this.z=prev?prev.z:0;
this.y=this.height*this.index;

this.dirAxis=this.index%2?"x":"z";
this.sizeAxis=this.index%2?"width":"depth";

this.speed=-0.1-(this.index*0.005);
this.dir=this.speed;

this.state=this.index>1?"active":"stopped";

let offset=this.index*0.3;
this.color=new THREE.Color(
(Math.sin(offset)+1)/2,
(Math.sin(offset+2)+1)/2,
(Math.sin(offset+4)+1)/2
);

let geo=new THREE.BoxGeometry(this.width,this.height,this.depth);
this.mesh=new THREE.Mesh(geo,new THREE.MeshToonMaterial({color:this.color}));
this.mesh.position.set(this.x,this.y,this.z);

if(this.state==="active"){
this[this.dirAxis]=Math.random()>0.5?12:-12;
}
}

tick(){
if(this.state==="active"){
this[this.dirAxis]+=this.dir;
if(Math.abs(this[this.dirAxis])>12) this.dir*=-1;
this.mesh.position[this.dirAxis]=this[this.dirAxis];
}
}

place(){
this.state="stopped";

let overlap=this.prev[this.sizeAxis]-Math.abs(this[this.dirAxis]-this.prev[this.dirAxis]);

if(overlap<=0) return null;

let newSize=overlap;
let cutSize=this[this.sizeAxis]-overlap;

this[this.sizeAxis]=newSize;

let placedGeo=new THREE.BoxGeometry(this.width,this.height,this.depth);
let placed=new THREE.Mesh(placedGeo,this.mesh.material);
placed.position.set(this.x,this.y,this.z);

let choppedGeo=new THREE.BoxGeometry(this.width,this.height,this.depth);
let chopped=new THREE.Mesh(choppedGeo,this.mesh.material);

if(this[this.dirAxis]>this.prev[this.dirAxis]){
chopped.position[this.dirAxis]=this[this.dirAxis]+newSize;
}else{
chopped.position[this.dirAxis]=this[this.dirAxis]-cutSize;
}

chopped.position.y=this.y;

return {placed,chopped};
}
}

class Game {
constructor(){
this.stage=new Stage();
this.blocks=[];

this.newGroup=new THREE.Group();
this.stage.add(this.newGroup);

this.score=document.getElementById("score");

this.add();
this.loop();

onclick=()=>this.action();
onkeydown=e=>{if(e.code==="Space") this.action();};
}

add(){
let last=this.blocks[this.blocks.length-1];
let b=new Block(last);
this.blocks.push(b);
this.stage.add(b.mesh);
this.score.innerHTML=this.blocks.length-1;
}

action(){
let b=this.blocks[this.blocks.length-1];
let res=b.place();

if(!res){ location.reload(); return; }

this.stage.add(res.placed);
this.stage.add(res.chopped);

TweenLite.to(res.chopped.position,1,{y:"-=30"});
this.add();
}

loop(){
this.blocks[this.blocks.length-1].tick();
this.stage.render();
requestAnimationFrame(()=>this.loop());
}
}

new Game();
</script>
</body>
</html>
