<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PGIS movies</title>

<style>
body {
    margin: 0;
    padding: 20px;
    background: #0f0f0f;
    color: white;
    font-family: Arial, sans-serif;
    z-index: 1;
}

input {
    width: 100%;
    max-width: 500px;
    padding: 14px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    outline: none;
    background: #1e1e1e;
    color: white;
}

select {
    margin-top: 10px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #1e1e1e;
    color: white;
}

h2 {
    margin-top: 25px;
}

#results {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 15px;
    margin-top: 20px;
}

.card {
    background: #1a1a1a;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.03);
}

.card img {
    width: 100%;
    display: block;
}

.card-info {
    padding: 10px;
}

.card-title {
    font-size: 15px;
    font-weight: bold;
}

.card-year {
    color: #aaa;
    margin-top: 4px;
    font-size: 14px;
}

#player {
    margin-top: 20px;
}

iframe {
    width: 100%;
    height: 80vh;
    border: none;
    border-radius: 12px;
    z-index: 99999;
}
 
#backBtn {
    display: none;
    margin-bottom: 10px;
    padding: 10px 16px;
    background: #222;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

#episodeControls {
    display: none;
    gap: 10px;
    margin-bottom: 10px;
}

#loadMoreBtn {
    margin-top: 20px;
    padding: 12px 18px;
    border: none;
    border-radius: 10px;
    background: #222;
    color: white;
    cursor: pointer;
}

  #particles-js{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
pointer-events:none;
background:transparent;
}

</style>
</head>

<body>
<div id="particles-js"></div>

  
<h1>PGIS movies</h1>
<button id="backBtn">X</button>

<input id="search" placeholder="Search movies or shows..." />

<select id="domainSelect">
    <option value="https://vidfast.pro">vidfast.pro</option>
    <option value="https://vidfast.in">vidfast.in</option>
    <option value="https://vidfast.io">vidfast.io</option>
    <option value="https://vidfast.me">vidfast.me</option>
    <option value="https://vidfast.net">vidfast.net</option>
    <option value="https://vidfast.pm">vidfast.pm</option>
    <option value="https://vidfast.xyz">vidfast.xyz</option>
</select>

<div id="episodeControls">
    <select id="seasonSelect"></select>
    <select id="episodeSelect"></select>
</div>

<h2 id="sectionTitle">Popular</h2>

<div id="results"></div>

<button id="loadMoreBtn">Load More</button>

<div id="player"></div>

<script>
const API_KEY = "58c450a9e134b118a282f43b3aea9da1";

const results = document.getElementById("results");
const searchInput = document.getElementById("search");
const player = document.getElementById("player");
const backBtn = document.getElementById("backBtn");
const sectionTitle = document.getElementById("sectionTitle");

const episodeControls = document.getElementById("episodeControls");
const seasonSelect = document.getElementById("seasonSelect");
const episodeSelect = document.getElementById("episodeSelect");

const loadMoreBtn = document.getElementById("loadMoreBtn");
const domainSelect = document.getElementById("domainSelect");

function getDomain() {
    return domainSelect.value;
}

let combined = [];
let page = 1;
let currentShowId = null;

function renderVisible() {
    results.innerHTML = "";
    combined.forEach(createCard);
}

async function fetchPopularPage() {
    const movieRes = await fetch(
        `https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}&page=${page}`
    );

    const tvRes = await fetch(
        `https://api.themoviedb.org/3/tv/popular?api_key=${API_KEY}&page=${page}`
    );

    const movieData = await movieRes.json();
    const tvData = await tvRes.json();

    combined.push(
        ...movieData.results.map(x => ({ ...x, media_type: "movie" })),
        ...tvData.results.map(x => ({ ...x, media_type: "tv" }))
    );

    renderVisible();
    page++;
}

function createCard(item) {
    if (!item.poster_path) return;

    const title = item.title || item.name;
    const year = (item.release_date || item.first_air_date || "").slice(0, 4);

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
        <img src="https://image.tmdb.org/t/p/w500${item.poster_path}">
        <div class="card-info">
            <div class="card-title">${title}</div>
            <div class="card-year">${year}</div>
        </div>
    `;

    div.onclick = () => openPlayer(item);

    results.appendChild(div);
}

async function openPlayer(item) {
    results.style.display = "none";
    searchInput.style.display = "none";
    sectionTitle.style.display = "none";
    loadMoreBtn.style.display = "none";

    backBtn.style.display = "inline-block";

    if (item.media_type === "movie") {
        episodeControls.style.display = "none";

        player.innerHTML = `
            <iframe src="${getDomain()}/movie/${item.id}" allowfullscreen></iframe>
        `;
    } else {
        currentShowId = item.id;

        episodeControls.style.display = "flex";

        const details = await fetch(
            `https://api.themoviedb.org/3/tv/${item.id}?api_key=${API_KEY}`
        ).then(r => r.json());

        seasonSelect.innerHTML = "";

        details.seasons.forEach(season => {
            if (season.season_number === 0) return;

            const opt = document.createElement("option");
            opt.value = season.season_number;
            opt.textContent = `Season ${season.season_number}`;
            seasonSelect.appendChild(opt);
        });

        loadEpisodes(item.id, 1);
    }
}

async function loadEpisodes(showId, season) {
    const data = await fetch(
        `https://api.themoviedb.org/3/tv/${showId}/season/${season}?api_key=${API_KEY}`
    ).then(r => r.json());

    episodeSelect.innerHTML = "";

    data.episodes.forEach(ep => {
        const opt = document.createElement("option");
        opt.value = ep.episode_number;
        opt.textContent = `Episode ${ep.episode_number}`;
        episodeSelect.appendChild(opt);
    });

    loadEpisodePlayer(showId, season, 1);
}

function loadEpisodePlayer(showId, season, episode) {
    player.innerHTML = `
        <iframe src="${getDomain()}/tv/${showId}/${season}/${episode}" allowfullscreen ></iframe>
    `;
}

seasonSelect.onchange = () => {
    loadEpisodes(currentShowId, seasonSelect.value);
};

episodeSelect.onchange = () => {
    loadEpisodePlayer(currentShowId, seasonSelect.value, episodeSelect.value);
};

loadMoreBtn.onclick = () => {
    fetchPopularPage();
};

searchInput.oninput = async () => {
    const q = searchInput.value.trim();

    if (!q) {
        results.style.display = "grid";
        page = 1;
        combined = [];
        await fetchPopularPage();
        return;
    }

    const data = await fetch(
        `https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(q)}`
    ).then(r => r.json());

    combined = data.results.filter(x => x.media_type === "movie" || x.media_type === "tv");

    renderVisible();
};

backBtn.onclick = () => {
    player.innerHTML = "";
    results.style.display = "grid";
    searchInput.style.display = "block";
    sectionTitle.style.display = "block";
    loadMoreBtn.style.display = "block";
    episodeControls.style.display = "none";
    backBtn.style.display = "none";
};

fetchPopularPage();
</script>

<script>
window.addEventListener("beforeunload", e => {
  if (document.activeElement?.tagName === "IFRAME") {
    e.preventDefault();
    e.returnValue = "";
  }
});
</script>



  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<script>

particlesJS('particles-js',{
"particles":{
"number":{"value":100,"density":{"enable":true,"value_area":800}},
"color":{"value":"#ffffff"},
"shape":{"type":"circle"},
"opacity":{"value":0.8,"random":true},
"size":{"value":3,"random":true},
"line_linked":{"enable":true,"distance":150,"color":"#ffffff","opacity":0.4,"width":1},
"move":{"enable":true,"speed":1.5,"direction":"none","straight":false,"out_mode":"out"}
},
"interactivity":{
"detect_on":"window",
"events":{"onhover":{"enable":true,"mode":"repulse"},"onclick":{"enable":false}},
"modes":{"repulse":{"distance":120,"duration":0.5}}
},
"retina_detect":true
})

</script>
</body>
</html>
