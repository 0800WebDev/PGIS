 <div id="particles-js"></div>

<script>
const BASE = "https://education-qik3.onrender.com";

const CODEC_KEY = "scramjet_codec_enabled";

function isCodecEnabled(){
	const v = localStorage.getItem(CODEC_KEY);
	return v === null ? true : v === "true";
}

function setCodecEnabled(v){
	localStorage.setItem(CODEC_KEY,String(v));
}

function getCodec(enabled){
	if(enabled){
		return {
			encode:`(url)=>{try{const u=new URL(url);u.hostname=u.hostname.replace(/\\./g,",");return u.toString()}catch(e){return url}}`,
			decode:`(e)=>{try{return e.replace(/:\\/\\/([^/]+)/,(m,h)=>"://"+h.replace(/,/g,"."))}catch(x){return e}}`
		};
	}else{
		return {
			encode:`(url)=>encodeURIComponent(url)`,
			decode:`(e)=>decodeURIComponent(e)`
		};
	}
}

let currentUrl="";
let globalConnection;

const form=document.getElementById("sj-form");
const address=document.getElementById("sj-address");
const searchEngine=document.getElementById("sj-search-engine");
const error=document.getElementById("sj-error");
const errorCode=document.getElementById("sj-error-code");

const {ScramjetController}=$scramjetLoadController();

const scramjet=new ScramjetController({
	prefix: BASE + "/scramjet/",
	codec: getCodec(isCodecEnabled()),
	files:{
		wasm: BASE + "/scram/scramjet.wasm.wasm",
		all: BASE + "/scram/scramjet.all.js",
		sync: BASE + "/scram/scramjet.sync.js"
	}
});

scramjet.init();

const connection=new BareMux.BareMuxConnection(BASE + "/baremux/worker.js");

form.addEventListener("submit",async(e)=>{
	e.preventDefault();

	try{
		await registerSW();
	}catch(err){
		error.textContent="SW failed";
		errorCode.textContent=err.toString();
		return;
	}

	const url = search(address.value, searchEngine.value);
	const wispUrl = BASE.replace("https","wss") + "/wisp/";

	if((await connection.getTransport())!==BASE+"/libcurl/index.mjs"){
		await connection.setTransport(BASE+"/libcurl/index.mjs",[{"websocket":wispUrl}]);
	}

	const frame = scramjet.createFrame();
	frame.frame.id="sj-frame";
	document.body.appendChild(frame.frame);
	frame.go(url);
});
</script>

<script>
function loadShortcut(targetUrl){
	const url = search(targetUrl, document.getElementById("sj-search-engine").value);

	registerSW().catch(()=>{});

	const conn = new BareMux.BareMuxConnection(BASE + "/baremux/worker.js");
	let wispUrl = BASE.replace("https","wss") + "/wisp/";

	conn.getTransport().then(async t=>{
		if(t!==BASE+"/libcurl/index.mjs"){
			await conn.setTransport(BASE+"/libcurl/index.mjs",[{"websocket":wispUrl}]);
		}

		const frame = scramjet.createFrame();
		frame.frame.id="sj-frame";
		document.body.appendChild(frame.frame);
		frame.go(url);
	});
}
</script>
