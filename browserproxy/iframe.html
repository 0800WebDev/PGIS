<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
<title>PGIS</title>

<link rel="shortcut icon" href="https://education-qik3.onrender.com/favicon.webp" />

<script src="https://education-qik3.onrender.com/scram/scramjet.all.js"></script>
<script src="https://education-qik3.onrender.com/baremux/index.js"></script>

<link rel="stylesheet" href="https://education-qik3.onrender.com/index.css" />
<script src="https://education-qik3.onrender.com/register-sw.js"></script>
<script src="https://education-qik3.onrender.com/search.js"></script>

<style>
html, body { scroll-behavior: smooth; text-align: center; background-color: black; color: whitesmoke; }
#particles-js{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}
</style>
</head>

<body>

<div id="particles-js"></div>

<h1>PGIS proxy</h1>

<form id="sj-form">
<input id="sj-search-engine" value="https://duckduckgo.com/?q=%s" type="hidden"/>
<input id="sj-address" type="text" placeholder="search or enter an url"/>
</form>

<p id="sj-error"></p>
<pre id="sj-error-code"></pre>

<script>
const BASE = "https://education-qik3.onrender.com";

const CODEC_KEY = "scramjet_codec_enabled";

function isCodecEnabled() {
    const val = localStorage.getItem(CODEC_KEY);
    return val === null ? true : val === "true";
}

function setCodecEnabled(val) {
    localStorage.setItem(CODEC_KEY, String(val));
}

function getCodec(enabled) {
    if (enabled) {
        return {
            encode: `(url)=>{try{const u=new URL(url);u.hostname=u.hostname.replace(/\\./g,",");return u.toString()}catch(e){return url}}`,
            decode: `(encoded)=>{try{return encoded.replace(/:\\/\\/([^/]+)/,(m,h)=>"://"+h.replace(/,/g,"."))}catch(e){return encoded}}`
        };
    } else {
        return {
            encode: `(url)=>encodeURIComponent(url)`,
            decode: `(encoded)=>decodeURIComponent(encoded)`
        };
    }
}

const form = document.getElementById("sj-form");
const address = document.getElementById("sj-address");
const searchEngine = document.getElementById("sj-search-engine");
const error = document.getElementById("sj-error");
const errorCode = document.getElementById("sj-error-code");

const { ScramjetController } = $scramjetLoadController();

const scramjet = new ScramjetController({
    prefix: BASE + "/scramjet/",
    codec: getCodec(isCodecEnabled()),
    files: {
        wasm: BASE + "/scram/scramjet.wasm.wasm",
        all: BASE + "/scram/scramjet.all.js",
        sync: BASE + "/scram/scramjet.sync.js",
    },
});

scramjet.init();

const connection = new BareMux.BareMuxConnection(BASE + "/baremux/worker.js");

form.addEventListener("submit", async (event) => {
    event.preventDefault();

    try {
        await registerSW();
    } catch (err) {
        error.textContent = "SW failed";
        errorCode.textContent = err.toString();
        return;
    }

    const url = search(address.value, searchEngine.value);

    let wispUrl = BASE.replace("https","wss") + "/wisp/";

    if ((await connection.getTransport()) !== "/libcurl/index.mjs") {
        await connection.setTransport(BASE + "/libcurl/index.mjs", [{ websocket: wispUrl }]);
    }

    const frame = scramjet.createFrame();
    document.body.appendChild(frame.frame);
    frame.go(url);
});
</script>

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<script>
particlesJS('particles-js',{
particles:{number:{value:60},size:{value:3}},
interactivity:{events:{onhover:{enable:true,mode:"repulse"}}}
});
</script>

</body>
</html>
